[build]
  publish = "."

# Pretty URLs — serve .html files without the extension
[[redirects]]
  from = "/services"
  to = "/services.html"
  status = 200

[[redirects]]
  from = "/results"
  to = "/results.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 200

# Blog articles — /blog/article-slug → /blog/article-slug.html
[[redirects]]
  from = "/blog/:slug"
  to = "/blog/:slug.html"
  status = 200

# French pages — pretty URLs under /fr/
[[redirects]]
  from = "/fr/services"
  to = "/fr/services.html"
  status = 200

[[redirects]]
  from = "/fr/results"
  to = "/fr/results.html"
  status = 200

[[redirects]]
  from = "/fr/about"
  to = "/fr/about.html"
  status = 200

[[redirects]]
  from = "/fr/contact"
  to = "/fr/contact.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
